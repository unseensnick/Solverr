name: Bug report
description: Report a problem with Solverr
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Please skim the README (including its Troubleshooting section) and search existing issues first.
  - type: checkboxes
    attributes:
      label: Before you start
      options:
        - label: I've read the README and its Troubleshooting section
          required: true
        - label: I've searched existing open and closed issues
          required: true
        - label: I can open the target site in a normal browser from the same network/IP
          required: true
  - type: dropdown
    id: engine
    attributes:
      label: Which engine was involved?
      options:
        - "auto (default)"
        - "chrome"
        - "stealth"
        - "not sure"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Solverr version / image tag:
        - Install method: [docker compose / docker run / source]
        - OS / architecture:
        - Using a proxy: [no / datacenter / residential]
      render: markdown
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Example URL that fails
      placeholder: https://example.com
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What you saw, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant lines from `docker logs solverr` (set `LOG_LEVEL=debug` for more). Remove any personal info.
      render: text
  - type: textarea
    id: config
    attributes:
      label: docker-compose / config (optional)
      render: yaml
