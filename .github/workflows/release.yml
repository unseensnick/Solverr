name: Release

# Creates a GitHub Release with an auto-generated changelog when a version tag
# is pushed. Docker images are published separately by release-docker.yml.

on:
  push:
    tags: ["v*.*.*"]

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog
        id: changelog
        run: |
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          range=${prev:+$prev..HEAD}
          {
            echo "changelog<<EOF"
            git log $range --no-merges --oneline
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
