name: Autotag

# Creates a `v<version>` tag when the version in package.json changes on main.
# Uses a Personal Access Token (GH_PAT secret) rather than GITHUB_TOKEN so the
# pushed tag triggers release.yml and release-docker.yml (tags pushed with the
# built-in GITHUB_TOKEN do not trigger other workflows).

on:
  push:
    branches: [main]

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auto tag
        uses: Klemensas/action-autotag@stable
        with:
          GITHUB_TOKEN: "${{ secrets.GH_PAT }}"
          tag_prefix: "v"
